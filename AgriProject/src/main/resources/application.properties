spring.application.name=AgriProject

# Email Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.properties.mail.smtp.starttls.enable=true

# Server Configuration
server.port=8083

# DataSource Configuration
spring.datasource.url=jdbc:mysql://localhost:3307/Agriculture
spring.datasource.username=
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.mvc.static-path-pattern=/uploads/**
spring.web.resources.static-locations=file:uploads/


# JPA & Hibernate Configuration

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Tell Hibernate to use the 'agribazar' schema for tables (optional for MySQL)
# spring.jpa.properties.hibernate.default_schema=agribazar

# Wait for Hibernate to create tables before running data.sql
spring.jpa.defer-datasource-initialization=true

# --- SQL Initialization Configuration ---

# Use this after the first run (prevents re-inserting data on app restarts)
spring.sql.init.mode=never

# Use this ONLY for the very first run when initializing schema/data:
# spring.sql.init.mode=always

spring.sql.init.continue-on-error=true

# Allow bigger file uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

#something random for secret key
jwt.secretKey=
logging.level.org.springframework.security=DEBUG


