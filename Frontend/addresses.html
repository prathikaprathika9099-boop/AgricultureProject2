<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manage Addresses</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", Arial, sans-serif;
        }

        body {
            background-color: #f4f4f4;
            color: #333;
        }

        header {
            padding: 20px;
            background-color: #2e7d32;
            color: white;
            text-align: center;
        }

        .section {
            padding: 40px;
            text-align: center;
        }

        h2 {
            font-size: 2rem;
            margin-bottom: 20px;
        }

        button {
            padding: 12px 25px;
            background-color: #43a047;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        button:hover {
            background-color: #388e3c;
        }

        .address-card {
            background: #fff;
            padding: 15px;
            margin: 15px 0;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            text-align: left;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .address-card:hover {
            transform: scale(1.05);
        }

        .address-details {
            margin-top: 10px;
        }

        /* ===== ADDRESS MODAL ===== */
        #addressModal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 100;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: flex-start;  /* Align at the top of the page */
        }

        #addressModal.show {
            display: flex;
            opacity: 1;
            visibility: visible;
        }

        .modal-box {
            background: #fff;
            width: 90%;
            max-width: 500px;
            padding: 25px;
            margin-top: 50px;  /* Add space from top */
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            animation: fadeIn 0.5s ease-out;
        }

        .modal-box h3 {
            margin-bottom: 20px;
            font-size: 1.5rem;
        }

        .modal-box input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
        }

        .modal-box button {
            padding: 12px 20px;
            background-color: #43a047;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
        }

        .modal-box button:hover {
            background-color: #388e3c;
        }

        .modal-box .cancel-btn {
            background-color: #e0e0e0;
            color: #333;
            margin-top: 10px;
        }

        .modal-box .cancel-btn:hover {
            background-color: #bdbdbd;
        }

        /* Animation for modal */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* Green checkmark container */
        .success-message {
            display: none;
            color: #43a047;
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<header>
    <h1>Manage Addresses</h1>
</header>

<div class="section">
    <button onclick="openAddressModal()">Add New Address</button>
    <div id="addressList"></div>
    <!-- Success message for address saved -->
    <div id="successMessage" class="success-message">
        ✔️ Address saved successfully!
    </div>
</div>

<!-- Address Modal -->
<div id="addressModal" class="modal">
    <div class="modal-box">
        <h3>Add New Address</h3>
        <input type="text" id="fullName" placeholder="Full Name" required>
        <input type="text" id="phone" placeholder="Phone Number" required>
        <input type="text" id="house" placeholder="House / Flat" required>
        <input type="text" id="street" placeholder="Street" required>
        <input type="text" id="city" placeholder="City" required>
        <input type="text" id="state" placeholder="State" required>
        <input type="text" id="pincode" placeholder="Pincode" required>
        <button onclick="saveAddress()">Save Address</button>
        <button class="cancel-btn" onclick="closeAddressModal()">Cancel</button>
    </div>
</div>

<script>
    // Open the modal to add a new address
    function openAddressModal() {
        document.getElementById("addressModal").classList.add("show");
    }

    // Close the address modal
    function closeAddressModal() {
        document.getElementById("addressModal").classList.remove("show");
    }

    // Function to save a new address
    async function saveAddress() {
        const userId = localStorage.getItem("userId");

        const address = {
            fullName: document.getElementById("fullName").value,
            phone: document.getElementById("phone").value,
            house: document.getElementById("house").value,
            street: document.getElementById("street").value,
            city: document.getElementById("city").value,
            state: document.getElementById("state").value,
            pincode: document.getElementById("pincode").value
        };

        // Send the address data to the backend
        await fetch(`http://localhost:8083/address/add/${userId}`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(address)
        });

        // Show the success message with green checkmark
        showSuccessMessage();
        closeAddressModal();
        loadAddresses();  // Reload the addresses list after saving
    }

    // Function to show success message
    function showSuccessMessage() {
        const successMessage = document.getElementById("successMessage");
        successMessage.style.display = "block"; // Display the success message
        setTimeout(() => {
            successMessage.style.display = "none"; // Hide the success message after 2 seconds
        }, 2000);
    }

    // Function to load existing addresses
    async function loadAddresses() {
        const userId = localStorage.getItem("userId");
        const res = await fetch(`http://localhost:8083/address/get/${userId}`);
        const addresses = await res.json();
        const addressList = document.getElementById("addressList");

        addressList.innerHTML = "";  // Clear the address list

        addresses.forEach(addr => {
            addressList.innerHTML += `
                <div class="address-card">
                    <div class="address-details">
                        <strong>${addr.fullName}</strong><br>
                        ${addr.house}, ${addr.street}<br>
                        ${addr.city}, ${addr.state} - ${addr.pincode}<br>
                        📞 ${addr.phone}
                    </div>
                </div>
            `;
        });
    }

    // Load the addresses when the page loads
    loadAddresses();
</script>

</body>
</html>
