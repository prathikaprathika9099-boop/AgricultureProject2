<button class="btn" onclick="payNow()">Pay Now</button>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<script>
    async function payNow() {
        const amount = cartTotal; // This is the total cart amount
        const userId = localStorage.getItem("userId");
        const addressId = localStorage.getItem("selectedAddressId");

        // Step 1: Reserve stock in the backend
        const res = await fetch(
            `http://localhost:8083/payment/reserve-stock?userId=${userId}&addressId=${addressId}&amount=${amount}`,
            { method: "POST" }
        );

        if (!res.ok) {
            alert("Error: Could not reserve stock. Please try again.");
            return;
        }

        // Step 2: Proceed with Razorpay payment
        const orderRes = await fetch(
            `http://localhost:8083/payment/create-order?amount=${amount}`,
            { method: "POST" }
        );

        const razorOrder = await orderRes.json();

        const options = {
            key: "rzp_test_E1VHn4r8R09Rak", // Replace with your Razorpay API Key
            amount: razorOrder.amount,
            currency: razorOrder.currency,
            name: "AgriBazaar",
            description: "Order Payment",
            order_id: razorOrder.id,

            handler: async function (response) {
    try {
        // Call the backend to confirm the payment
        const res = await fetch("http://localhost:8083/payment/confirm", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                userId,
                addressId,
                amount,
                razorpayOrderId: response.razorpay_order_id,
                razorpayPaymentId: response.razorpay_payment_id
            })
        });

        // If payment is successful, proceed
        if (res.ok) {
            alert("Order placed successfully 🎉");
            window.location.href = "order_history.html";
        } else {
            // If payment fails, release the lock on stock
            await fetch(`http://localhost:8083/payment/release-stock?userId=${userId}`, { method: "POST" });
            alert("Payment failed. Stock has been released.");
            window.location.href = "cart.html"; // Redirect to cart or orders page
        }
    } catch (error) {
        console.error("Error during payment confirmation:", error);
        alert("An error occurred. Please try again.");
    }
},


            theme: { color: "#2e7d32" }
        };

        const rzp = new Razorpay(options);
        rzp.open();
    }
</script>
