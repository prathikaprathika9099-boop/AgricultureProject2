<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>All Products | AgriBazaar</title>

    <style>
        body {
            margin: 0;
            min-height: 100vh;
            background: #4fa65b;
            font-family: Arial, sans-serif;
            position: relative;
        }

        h1 {
            text-align: center;
            color: white;
            margin: 30px 0 10px;
        }

        .header-buttons {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
        }

        .header-buttons a {
            background-color: #2e7d32;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            text-decoration: none;
            font-size: 14px;
        }

        .header-buttons a:hover {
            background-color: #1b5e20;
        }

        #searchBar {
            text-align: center;
            margin-bottom: 20px;
        }

        #searchInput {
            padding: 8px 16px;
            font-size: 16px;
            width: 300px;
            border-radius: 4px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 28px;
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px;
        }

        .card {
            background: white;
            border-radius: 18px;
            padding: 14px;
            text-align: center;
            box-shadow: 0 6px 15px rgba(0,0,0,0.15);
        }

        .card img {
            width: 100%;
            height: 160px;
            object-fit: cover;
            border-radius: 14px;
        }

        .card h3 {
            margin: 10px 0 4px;
            color: #2e7d32;
            font-size: 18px;
        }

        .desc {
            font-size: 14px;
            color: #444;
            margin-bottom: 6px;
        }

        .price, .stock {
            font-weight: bold;
            color: #1b5e20;
            font-size: 15px;
            margin-bottom: 6px;
        }

        .add-btn, .edit-btn, .delete-btn {
            background: #2e7d32;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            margin: 4px;
        }

        .add-btn:hover, .edit-btn:hover, .delete-btn:hover {
            background: #1b5e20;
        }

        .quantity-box, .edit-box {
            display: none;
            margin-top: 8px;
        }

        .quantity-box input,
        .edit-box input {
            width: 70px;
            padding: 5px;
            margin: 4px;
        }

        .quantity-box button,
        .edit-box button {
            padding: 6px 10px;
            margin: 4px;
        }

        .message {
            display: none;
            margin-top: 8px;
            font-size: 14px;
            padding: 6px;
            border-radius: 6px;
        }

        .success {
            background-color: #4caf50;
            color: white;
        }

        .error {
            background-color: #f44336;
            color: white;
        }
    </style>
</head>

<body>

<div class="header-buttons">
    <a href="Cart.html">My Cart</a>
    <a href="order_history.html">My Orders</a>
</div>

<h1>All Products</h1>

<div id="searchBar">
    <input type="text" id="searchInput" placeholder="Search Products..." onkeyup="searchProducts()">
</div>

<div class="grid" id="productGrid"></div>

<script src="https://cdn.jsdelivr.net/npm/fuse.js"></script>

<script>

    let allProducts = [];
    let userRole = localStorage.getItem("userRole");

    async function loadAllProducts() {
        const res = await fetch("http://localhost:8083/get/all/products");
        const products = await res.json();
        allProducts = products;
        displayProducts(products);
    }

    function displayProducts(products) {
        const grid = document.getElementById("productGrid");
        grid.innerHTML = "";

        products.forEach(p => {

            let editButton = "";
            let deleteButton = "";

            if (userRole === "FARMER") {
                editButton = `<button class="edit-btn" onclick="showEditBox(${p.id})">Edit</button>`;
                deleteButton = `<button class="delete-btn" onclick="deleteProduct(${p.id})">Delete</button>`;
            }

            grid.innerHTML += `
            <div class="card">
                <img src="${p.imageUrl}" alt="${p.name}">
                <div id="message-${p.id}" class="message"></div>

                <h3>${p.name}</h3>
                <div class="desc">${p.description}</div>
                <div class="price">₹ ${p.cost}</div>
                <div class="stock">Available Quantity: ${p.stock}</div>

                ${editButton}
                ${deleteButton}

                <button class="add-btn" onclick="showQuantityBox(${p.id})">Add to Cart</button>

                <div class="quantity-box" id="qtyBox-${p.id}">
                    <input type="number" id="qty-${p.id}" min="1" placeholder="Qty">
                    <button onclick="confirmAdd(${p.id})">Add</button>
                </div>

                <div class="edit-box" id="editBox-${p.id}">
                    <input type="number" id="editPrice-${p.id}" placeholder="New Price">
                    <input type="number" id="editStock-${p.id}" placeholder="New Stock">
                    <button onclick="confirmEdit(${p.id})">Update</button>
                </div>
            </div>`;
        });
    }

    /* ================= ADD TO CART ================= */

    function showQuantityBox(id) {
        document.getElementById("qtyBox-" + id).style.display = "block";

        const msg = document.getElementById("message-" + id);
        msg.style.display = "none";
    }

    async function confirmAdd(id) {
        const userId = localStorage.getItem("userId");
        const quantity = parseInt(document.getElementById("qty-" + id).value);


        if (!userId) {
            showMessage(id, "Please login to add products", false);
            return;
        }

        if (!quantity || quantity <= 0) {
            showMessage(id, "Invalid quantity", false);
            return;
        }

        const product = allProducts.find(p => p.id === id);

         if (product && quantity > product.stock) {
            showMessage(id, `Only ${product.stock} available`, false);
            return;
        }

        try {
            const res = await fetch(
                `http://localhost:8083/cart/add?userId=${userId}&productId=${id}&quantity=${quantity}`,
                { method: "POST" }
            );

            if (!res.ok) throw new Error(await res.text());

            showMessage(id, "Product added successfully ✔", true);
            document.getElementById("qtyBox-" + id).style.display = "none";

        } catch (err) {
            showMessage(id, err.message, false);
        }
    }

    /* ================= EDIT PRODUCT ================= */

    function showEditBox(id) {
        document.getElementById("editBox-" + id).style.display = "block";
    }

    async function confirmEdit(id) {
        const newPrice = document.getElementById("editPrice-" + id).value;
        const newStock = document.getElementById("editStock-" + id).value;

        if (!newPrice && !newStock) {
            showMessage(id, "Enter price or stock", false);
            return;
        }

        try {
            const res = await fetch(`http://localhost:8083/product/update/${id}`, {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    price: newPrice ? parseFloat(newPrice) : null,
                    stock: newStock ? parseInt(newStock) : null
                })
            });

            if (!res.ok) throw new Error("Update failed");

            showMessage(id, "Product updated successfully ✔", true);
            document.getElementById("editBox-" + id).style.display = "none";
            loadAllProducts();

        } catch (err) {
            showMessage(id, err.message, false);
        }
    }

    /* ================= DELETE (UNCHANGED) ================= */

    async function deleteProduct(id) {
        if (confirm("Are you sure you want to delete this product?")) {
            try {
                const res = await fetch(`http://localhost:8083/product/delete/${id}`, {
                    method: "DELETE"
                });

                if (res.ok) {
                    loadAllProducts();
                } else {
                    alert("Failed to delete product");
                }

            } catch (err) {
                alert("Error: " + err.message);
            }
        }
    }

    /* ================= MESSAGE ================= */

    function showMessage(id, text, success) {
        const msg = document.getElementById("message-" + id);
        msg.className = "message " + (success ? "success" : "error");
        msg.innerText = text;
        msg.style.display = "block";

        setTimeout(() => {
            msg.style.display = "none";
        }, 3000);
    }

    /* ================= SEARCH (UNCHANGED) ================= */

    function searchProducts() {
        const searchTerm = document.getElementById("searchInput").value.toLowerCase();

        if (!searchTerm) {
            displayProducts(allProducts);
            return;
        }

        const fuse = new Fuse(allProducts, {
            keys: ["name", "description"],
            threshold: 0.3,
        });

        const result = fuse.search(searchTerm).map(r => r.item);
        displayProducts(result);
    }

    loadAllProducts();

</script>
</body>
</html>
