<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AgriBazaar | Upload Product</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        /* Existing Styles */
        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #1b5e20, #66bb6a);
            font-family: Arial, sans-serif;
            padding: 30px;
        }

        .container {
            max-width: 1000px;
            margin: auto;
        }

        .card {
            background: #ffffff;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            color: #1b5e20;
            margin-bottom: 20px;
        }

        input, button {
            width: 100%;
            margin-top: 12px;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        button {
            background: #1b5e20;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #145a17;
        }

        .result {
            margin-top: 10px;
            text-align: center;
            font-size: 14px;
            color: green;
        }

        .products {
            margin-top: 30px;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
        }

        .product-card {
            background: white;
            border-radius: 10px;
            padding: 12px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.15);
            text-align: center;
        }

        .product-card img {
            width: 100%;
            height: 160px;
            object-fit: cover;
            border-radius: 8px;
        }

        .product-card h4 {
            margin: 8px 0 4px;
            color: #1b5e20;
        }

        .product-card p {
            margin: 2px 0;
            font-size: 13px;
        }

        .price {
            font-weight: bold;
            color: #2e7d32;
        }
    </style>
</head>

<body>

<div class="container">

    <!-- Upload Product -->
    <div class="card">
        <h2>Upload Product 🌾</h2>

        <input type="text" id="name" placeholder="Product Name" required>
        <input type="number" id="cost" placeholder="Cost" required>
        <input type="number" id="stock" placeholder="Stock Available" required>
        <input type="text" id="description" placeholder="Description" required>
        <input type="file" id="image" accept="image/*" required>

        <button onclick="uploadProduct()">Upload</button>
        <div class="result" id="result"></div>
    </div>

    <!-- Product List -->
    <div class="products">
        <h2 style="color:white; text-align:center;">My Uploaded Products</h2>
        <div class="product-grid" id="productGrid"></div>
    </div>

</div>

<script>
    // 🔑 Get logged-in userId
    const userId = Number(localStorage.getItem("userId"));

    if (!userId) {
        alert("User not logged in");
        window.location.href = "login.html";
    }

    // Upload product (NO reload after upload)
    function uploadProduct() {
        const name = document.getElementById("name").value;
        const cost = document.getElementById("cost").value;
        const stock = document.getElementById("stock").value;
        const description = document.getElementById("description").value;
        const image = document.getElementById("image").files[0];

        if (!name || !cost || !stock || !description || !image) {
            alert("Fill all fields");
            return;
        }

        const formData = new FormData();
        formData.append("name", name);
        formData.append("cost", cost);
        formData.append("stock", stock);
        formData.append("description", description);
        formData.append("image", image);
        formData.append("userId", userId);

        fetch("http://localhost:8083/upload/image", {
            method: "POST",
            body: formData
        })
        .then(res => res.json())
        .then(() => {
            document.getElementById("result").innerText =
                "Product uploaded successfully ✅";

            document.getElementById("name").value = "";
            document.getElementById("cost").value = "";
            document.getElementById("stock").value = "";
            document.getElementById("description").value = "";
            document.getElementById("image").value = "";
        })
        .catch(err => {
            console.error(err);
            alert("Upload failed ❌");
        });
    }

    // Load products ONCE when page opens
    function loadProducts() {
    fetch(`http://localhost:8083/get/product?userId=${userId}`)
        .then(res => res.json())
        .then(products => {
            const grid = document.getElementById("productGrid");
            grid.innerHTML = "";

            if (!products || products.length === 0) {
                grid.innerHTML =
                    "<p style='color:white; text-align:center;'>No products uploaded yet</p>";
                return;
            }

            products.forEach(p => {
                const card = document.createElement("div");
                card.className = "product-card";

                const img = document.createElement("img");
                img.loading = "lazy";
                img.src = "http://localhost:8083" + p.imageUrl;
                img.alt = p.name;
                img.onerror = () => img.src = 'default.png';
                card.appendChild(img);


                const h4 = document.createElement("h4");
                h4.textContent = p.name;
                card.appendChild(h4);

                const desc = document.createElement("p");
                desc.textContent = p.description;
                card.appendChild(desc);

                const price = document.createElement("p");
                price.className = "price";
                price.textContent = `₹ ${p.cost}`;
                card.appendChild(price);

                grid.appendChild(card);
            });
        })
        .catch(err => console.error(err));
}


    // 🔥 Load on page entry
    window.addEventListener("DOMContentLoaded", loadProducts);
</script>

</body>
</html>
